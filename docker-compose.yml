services:
  db:
    image: postgres:16
    container_name: protocol-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-protocols}
      POSTGRES_USER: ${POSTGRES_USER:-protocols_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-protocols_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
